<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Health Prediction System</title>\n    <script>\n        const express = require('express');\n        const bodyParser = require('body-parser');\n        const app = express();\n        const PORT = process.env.PORT || 3000;\n\n        app.use(bodyParser.urlencoded({ extended: true }));\n        app.use(express.static('public'));\n\n        app.get('/', (req, res) => {\n            res.sendFile(__dirname + '/health_prediction_system.html');\n        });\n\n        app.post('/predict', (req, res) => {\n            const data = req.body;\n            // Simple prediction logic (placeholder)\n            let prediction = 'Low Risk'; // Placeholder logic\n            if (data.age > 40 && data.cholesterol > 200) {\n                prediction = 'High Risk';\n            }\n            res.send(`Prediction: ${prediction}`);\n        });\n\n        app.listen(PORT, () => {\n            console.log(`Server is running on port ${PORT}`);\n        });\n    <\/script>\n</head>\n<body>\n    <h1>Health Prediction System</h1>\n    <form action="/predict" method="post">\n        <label for="age">Age:</label>\n        <input type="number" name="age" required><br>\n        <label for="cholesterol">Cholesterol Level:</label>\n        <input type="number" name="cholesterol" required><br>\n        <input type="submit" value="Predict">\n    </form>\n</body>\n</html>\n
